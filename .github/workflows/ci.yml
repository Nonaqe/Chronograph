name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  # Каждый тестовый бинарь статически линкует весь тяжёлый граф (duckdb-bundled,
  # arrow, gix, 5 грамматик tree-sitter). Их несколько — суммарно десятки ГБ.
  # Отладочная информация раздувает артефакты и рвёт линковщик по диску
  # (SIGBUS при mmap = ENOSPC). Отключаем debug info в сборке — КОД НЕ МЕНЯЕТСЯ,
  # только вес артефактов (это env-оверрайды профилей, не правки crates/).
  CARGO_PROFILE_TEST_DEBUG: '0'
  CARGO_PROFILE_DEV_DEBUG: '0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # GitHub-раннеры несут ~30 ГБ предустановленного софта (Android SDK, .NET,
      # Haskell, docker-образы), который нам не нужен. Освобождаем место до сборки.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Disk space (after cleanup, before build)
        run: df -h

      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Disk space (before tests)
        run: df -h

      # Основной фикс диска — освобождение места выше + CARGO_PROFILE_*_DEBUG=0.
      # Если этого не хватит (df -h ниже покажет), раскомментируй --jobs 2, чтобы
      # линковать меньше огромных тестовых бинарей одновременно (ниже пиковый диск,
      # но медленнее). Полностью проблему объёма это не решает — только пик.
      - name: Test
        run: cargo test --workspace   # при нехватке диска: cargo test --workspace --jobs 2

      - name: Disk space (after tests)
        if: always()
        run: df -h
