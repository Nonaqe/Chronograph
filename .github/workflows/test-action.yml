name: Test action end-to-end

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (as the target to analyze)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run chronograph action
        uses: ./action
        with:
          path: '.'
          output: 'chronograph-report.html'

      - name: Show report exists
        run: ls -la chronograph-report.html
